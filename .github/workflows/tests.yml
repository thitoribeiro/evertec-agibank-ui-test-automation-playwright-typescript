name: Agi Blog — UI Tests (Playwright + TypeScript)

on:
  push:
    branches: [main, develop, feature/**]

  pull_request:
    branches: [main]

  # Smoke test automático a cada 6 horas
  schedule:
    - cron: '0 */6 * * *'

  # Disparo manual com parâmetros escolhidos pelo usuário
  workflow_dispatch:
    inputs:
      browser:
        description: 'Browser para executar os testes'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - chromium
          - firefox
      suite:
        description: 'Suite de testes a executar'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - homepage
          - search
          - article
          - navigation
          - pagination
      environment:
        description: 'URL base do ambiente alvo'
        required: false
        default: 'https://blog.agibank.com.br'
        type: string

# Evita execuções duplicadas na mesma branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────
  # JOB: testes nativos (chromium e firefox)
  # ─────────────────────────────────────────────
  test:
    name: Tests — ${{ matrix.browser }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        browser: ${{
          fromJson(
            github.event_name == 'workflow_dispatch' && inputs.browser != 'all'
              && format('["{0}"]', inputs.browser)
              || '["chromium","firefox"]'
          ) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Run tests
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.suite }}" != "all" ]; then
            npx playwright test src/tests/${{ inputs.suite }}.spec.ts --project=${{ matrix.browser }}
          else
            npx playwright test --project=${{ matrix.browser }}
          fi
        env:
          BASE_URL: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'https://blog.agibank.com.br' }}
          CI: true

      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.browser }}
          path: playwright-report/
          retention-days: 30

      - name: Upload test results (videos + traces)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.browser }}
          path: test-results/
          retention-days: 30

  # ─────────────────────────────────────────────
  # JOB: validação da imagem Docker
  # Só executa em push/PR — não no schedule nem manual
  # ─────────────────────────────────────────────
  docker:
    name: Docker — build & run
    runs-on: ubuntu-latest
    needs: test
    if: |
      always() &&
      github.event_name != 'schedule' &&
      github.event_name != 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker compose build test-runner

      - name: Run tests in Docker (headless + video)
        run: docker compose run --rm test-runner
        env:
          BASE_URL: https://blog.agibank.com.br

      - name: Upload Docker report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-docker
          path: playwright-report/
          retention-days: 30

  # ─────────────────────────────────────────────
  # JOB: resumo final (badge de status)
  # ─────────────────────────────────────────────
  summary:
    name: Summary
    runs-on: ubuntu-latest
    needs: [test]
    if: always()

    steps:
      - name: Check test results
        run: |
          if [ "${{ needs.test.result }}" = "failure" ]; then
            echo "::error::One or more test jobs failed."
            exit 1
          fi
          echo "All test jobs passed."
