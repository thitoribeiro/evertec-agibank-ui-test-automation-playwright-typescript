name: Agi Blog — UI Tests (Playwright + TypeScript)

on:
  push:
    branches: [main, develop, feature/**]

  pull_request:
    branches: [main]

  schedule:
    - cron: '0 */6 * * *'

  workflow_dispatch:
    inputs:
      suite:
        description: 'Suite de testes (deixe "all" para rodar tudo)'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - homepage
          - search
          - article
          - navigation
          - pagination
      base_url:
        description: 'URL do ambiente'
        required: true
        default: 'https://blog.agibank.com.br'
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────
  # Firefox
  # ─────────────────────────────────────────────
  test-firefox:
    name: Tests — firefox
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps firefox

      - name: Run tests — all suites
        if: github.event_name != 'workflow_dispatch' || inputs.suite == 'all'
        run: npx playwright test --project=firefox
        env:
          BASE_URL: ${{ github.event_name == 'workflow_dispatch' && inputs.base_url || 'https://blog.agibank.com.br' }}
          CI: true

      - name: Run tests — ${{ inputs.suite }} suite only
        if: github.event_name == 'workflow_dispatch' && inputs.suite != 'all'
        run: npx playwright test src/tests/${{ inputs.suite }}.spec.ts --project=firefox
        env:
          BASE_URL: ${{ inputs.base_url }}
          CI: true

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-firefox
          path: playwright-report/
          retention-days: 30

      - name: Upload videos and traces
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-firefox
          path: test-results/
          retention-days: 30

  # ─────────────────────────────────────────────
  # Docker — só em push e pull_request
  # ─────────────────────────────────────────────
  docker:
    name: Docker — build & run
    runs-on: ubuntu-latest
    needs: [test-firefox]
    if: always() && (github.event_name == 'push' || github.event_name == 'pull_request')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker compose build test-runner

      - name: Run tests in Docker
        run: docker compose run --rm test-runner
        env:
          BASE_URL: https://blog.agibank.com.br
        continue-on-error: true

      - name: Upload Docker report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-docker
          path: playwright-report/
          retention-days: 30
