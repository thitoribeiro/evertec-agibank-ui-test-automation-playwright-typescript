name: Agi Blog — UI Tests (Playwright + TypeScript)

on:
  push:
    branches: [main, develop, feature/**]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Run tests — ${{ matrix.browser }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Run tests
        run: npx playwright test --project=${{ matrix.browser }}
        env:
          BASE_URL: https://blog.agibank.com.br
          CI: true
        continue-on-error: true

      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.browser }}
          path: playwright-report/
          retention-days: 30

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.browser }}
          path: test-results/
          retention-days: 30

  docker:
    name: Docker build verification
    runs-on: ubuntu-latest
    needs: test
    if: always()

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker compose build test-runner

      - name: Run tests in Docker (headless)
        run: docker compose run --rm test-runner
        env:
          BASE_URL: https://blog.agibank.com.br
        continue-on-error: true

      - name: Upload Docker test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-docker
          path: playwright-report/
          retention-days: 30
